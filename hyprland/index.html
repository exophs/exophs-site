<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hyprland</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --mantle: #181825;
      --crust: #11111b;
      --text: #cdd6f4;
      --subtext: #bac2de;
      --surface: #313244;
      --overlay: #6c7086;
      --accent: #89b4fa;
      --border: rgba(203,166,247,0.18);
      --focused-border: #89b4fa;
      --waybar-bg: rgba(0,0,0,0.65);
      --titlebar-bg: rgba(20,20,35,0.9);
    }
    [data-theme="mocha"] {
      --bg: #1e1e2e; --mantle: #181825; --crust: #11111b;
      --text: #cdd6f4; --subtext: #bac2de; --surface: #313244;
      --overlay: #6c7086; --accent: #89b4fa; --focused-border: #89b4fa;
      --border: rgba(203,166,247,0.18);
    }
    [data-theme="macchiato"] {
      --bg: #24273a; --mantle: #1e2030; --crust: #181926;
      --text: #cad3f5; --subtext: #b8c0e0; --surface: #363a4f;
      --overlay: #6e738d; --accent: #8aadf4; --focused-border: #8aadf4;
      --border: rgba(198,160,246,0.2);
    }
    [data-theme="frappe"] {
      --bg: #303446; --mantle: #292c3c; --crust: #232634;
      --text: #c6d0f5; --subtext: #b5bfe2; --surface: #414559;
      --overlay: #737994; --accent: #8caaee; --focused-border: #8caaee;
      --border: rgba(202,158,230,0.2);
    }
    [data-theme="latte"] {
      --bg: #eff1f5; --mantle: #e6e9ef; --crust: #dce0e8;
      --text: #4c4f69; --subtext: #5c5f77; --surface: #ccd0da;
      --overlay: #9ca0b0; --accent: #1e66f5; --focused-border: #1e66f5;
      --border: rgba(136,57,239,0.15);
      --waybar-bg: rgba(255,255,255,0.65);
      --titlebar-bg: rgba(220,225,235,0.9);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg) url('https://confusing.wtf/u/cold-alley.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: var(--text); overflow: hidden;
      image-rendering: crisp-edges;
      transition: background-image 0.4s ease;
      user-select: none;
    }
    .content, .content * {
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background: rgba(15,15,23,0.4); z-index: -2; pointer-events: none;
    }
    .waybar, .controls, .theme-overlay,
    .titlebar, .min-tab, .palette-btn, .wallpaper-preview {
      user-select: none;
    }
    .waybar {
      position: fixed; top: 0; left: 0; right: 0; height: 36px;
      background: var(--waybar-bg);
      backdrop-filter: blur(12px) saturate(160%);
      color: var(--text); display: flex;
      justify-content: space-between; align-items: center;
      padding: 0 16px; z-index: 9999;
      font-size: 14px; overflow: hidden;
    }
    .waybar > div { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .waybar-left { text-align: left; }
    .waybar-center { text-align: center; font-weight: 500; }
    .waybar-right { text-align: right; display: flex; align-items: center; gap: 20px; }
    .workspaces button {
      background: transparent; border: none; color: var(--text);
      padding: 4px 10px; margin: 0 4px; border-radius: 4px;
      cursor: pointer; transition: all 0.15s; font-weight: bold;
    }
    .workspaces button.active {
      background: rgba(0,170,255,0.35); color: var(--accent);
    }
    .workspaces button:hover { background: rgba(255,255,255,0.12); }
    .minimized-tabs { display: flex; gap: 8px; }
    .min-tab {
      background: rgba(50,50,70,0.8); color: var(--text);
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      cursor: pointer; border: 1px solid var(--border);
      max-width: 140px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; transition: all 0.16s;
    }
    .min-tab:hover { background: rgba(80,80,100,0.9); }
    #desktop { position: absolute; inset: 42px 12px 12px 12px; }
    .window {
      position: absolute; min-width: 340px; min-height: 240px;
      background: rgba(30,30,46,0.82); backdrop-filter: blur(14px);
      border: 1px solid var(--border); border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: var(--text); overflow: hidden; display: none;
      transition: opacity 0.18s ease, border-color 0.3s;
    }
    .window.visible { display: block; }
    .window.focused {
      border-color: var(--focused-border);
      box-shadow: 0 12px 36px rgba(137,180,250,0.22);
    }
    .titlebar {
      height: 34px; background: var(--titlebar-bg);
      border-bottom: 1px solid var(--overlay);
      display: flex; align-items: center; padding: 0 12px;
      font-size: 13px; font-weight: 600; user-select: none;
    }
    .titlebar .buttons { display: flex; gap: 8px; margin-right: 12px; }
    .btn { width: 12px; height: 12px; border-radius: 50%; transition: all 0.14s; }
    .btn.close { background: #f38ba8; }
    .btn.minimize { background: #fab387; }
    .btn.maximize { background: #a6e3a1; }
    .btn:hover { filter: brightness(1.3); transform: scale(1.15); }
    .title { flex: 1; text-align: center; color: var(--subtext); }
    .content { padding: 16px; font-size: 14px; line-height: 1.5; }
    .controls {
      position: fixed; bottom: 16px; left: 16px; z-index: 10000;
      display: flex; gap: 12px;
    }
    .controls button {
      background: rgba(30,30,46,0.88); backdrop-filter: blur(10px);
      border: 1px solid var(--border); color: var(--text);
      padding: 8px 14px; border-radius: 10px; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .controls button:hover {
      background: rgba(40,40,60,0.95); border-color: var(--accent);
      transform: translateY(-1px);
    }
    #theme-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      z-index: 10001;
    }
    .theme-window {
      background: var(--surface); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 14px;
      width: 640px; max-height: 85vh; overflow-y: auto;
      padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      color: var(--text);
    }
    h2 { margin: 0 0 16px; color: var(--accent); }
    .section { margin-bottom: 28px; }
    .palette-btn {
      padding: 10px 16px; margin: 6px; border: 1px solid var(--border);
      background: var(--mantle); color: var(--text);
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .palette-btn:hover {
      background: var(--surface); border-color: var(--accent);
      transform: translateY(-1px);
    }
    .wallpaper-preview {
      width: 180px; height: 100px; object-fit: cover;
      border-radius: 6px; border: 2px solid transparent;
      margin: 8px; cursor: pointer; transition: all 0.2s;
    }
    .wallpaper-preview.selected {
      border-color: var(--accent); box-shadow: 0 0 12px var(--accent);
    }
  </style>
</head>
<body data-theme="mocha">
<div class="waybar">
  <div class="waybar-left">
    <span class="workspaces" id="workspaces">
      <button data-ws="1" class="active">[1]</button>
      <button data-ws="2">2</button>
      <button data-ws="3">3</button>
      <button data-ws="4">4</button>
    </span>
  </div>
  <div class="waybar-center" id="clock"></div>
  <div class="waybar-right">
    <span class="minimized-tabs" id="minimized-tabs"></span>
  </div>
</div>
<div id="desktop"></div>
<div class="controls">
  <button onclick="spawnWindow()">New Window</button>
  <button onclick="document.getElementById('theme-overlay').style.display='flex'">Themes</button>
</div>

<div id="theme-overlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="theme-window">
    <h2>Appearance</h2>
    <div class="section">
      <h3>Color Palette (Catppuccin)</h3>
      <button class="palette-btn" onclick="setTheme('latte')">Latte (Light)</button>
      <button class="palette-btn" onclick="setTheme('frappe')">Frappé</button>
      <button class="palette-btn" onclick="setTheme('macchiato')">Macchiato</button>
      <button class="palette-btn" onclick="setTheme('mocha')">Mocha (Default)</button>
    </div>
    <div class="section">
      <h3>Wallpaper</h3>
      <div style="display:flex; flex-wrap:wrap; justify-content:center;">
        <img src="https://confusing.wtf/u/cold-alley.png" class="wallpaper-preview" onclick="setWallpaper(this.src)" alt="Cold Alley">
        <img src="https://confusing.wtf/u/metropolis-mocha-v1.png" class="wallpaper-preview" onclick="setWallpaper(this.src)" alt="Metropolis Mocha">
        <img src="https://confusing.wtf/u/panes.jpg" class="wallpaper-preview" onclick="setWallpaper(this.src)" alt="Panes">
        <img src="https://confusing.wtf/u/river-city.jpg" class="wallpaper-preview" onclick="setWallpaper(this.src)" alt="River City">
        <img src="https://confusing.wtf/u/soaring-off.jpg" class="wallpaper-preview" onclick="setWallpaper(this.src)" alt="Soaring Off">
        <img src="https://confusing.wtf/u/bunnies-road.png" class="wallpaper-preview" onclick="setWallpaper(this.src)" alt="Bunnies Road">
      </div>
    </div>
    <p style="text-align:center; color:var(--overlay); margin-top:20px;">
      Click outside to close • Changes apply instantly
    </p>
  </div>
</div>

<script>
let currentWorkspace = 1;
let zIndex = 10;
let focused = null;
let windowCounter = 0;
let dragging = false;
let dragX = 0;
let dragY = 0;
let dragTarget = null;

function setTheme(flavor) {
  document.body.dataset.theme = flavor;
}

function setWallpaper(url) {
  document.body.style.backgroundImage = `url('${url}')`;
  document.querySelectorAll('.wallpaper-preview').forEach(img => {
    img.classList.toggle('selected', img.src === url);
  });
}

document.querySelectorAll('#workspaces button').forEach(btn => {
  btn.addEventListener('click', () => {
    const ws = parseInt(btn.dataset.ws);
    if (ws === currentWorkspace) return;
    document.querySelectorAll('#workspaces button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentWorkspace = ws;
    document.querySelectorAll('.window').forEach(win => {
      win.classList.toggle('visible', parseInt(win.dataset.workspace) === ws);
    });
    const visible = [...document.querySelectorAll('.window.visible')]
      .sort((a,b) => Number(b.style.zIndex) - Number(a.style.zIndex));
    focused = visible[0] || null;
    if (focused) focused.classList.add('focused');
  });
});

function spawnWindow() {
  windowCounter++;
  const win = document.createElement('div');
  win.className = 'window visible';
  win.dataset.workspace = currentWorkspace;
  win.style.left = (80 + Math.random()*700) + 'px';
  win.style.top = (80 + Math.random()*400) + 'px';
  win.style.width = '480px';
  win.style.height = '360px';
  win.style.zIndex = zIndex++;
  win.innerHTML = `
    <div class="titlebar">
      <div class="buttons">
        <div class="btn close" onclick="closeWindow(this.closest('.window'))"></div>
        <div class="btn minimize" onclick="minimizeWindow(this.closest('.window'))"></div>
        <div class="btn maximize" onclick="maximizeWindow(this.closest('.window'))"></div>
      </div>
      <div class="title">kitty — fish ${windowCounter}</div>
    </div>
    <div class="content">
      <p><strong>user@hypr ~</strong> $ neofetch</p>
      <pre style="color:var(--accent); margin:10px 0;">
OS: Arch Linux
Kernel: 6.13-zen
CPU: AMD Ryzen 9
GPU: RTX 4070
Memory: 64GiB
      </pre>
    </div>
  `;
  document.getElementById('desktop').appendChild(win);
  makeDraggable(win);
  makeFocusable(win);
  focusWindow(win);
}

function minimizeWindow(win) {
  const title = win.querySelector('.title').textContent.trim();
  const tab = document.createElement('div');
  tab.className = 'min-tab';
  tab.textContent = title.length > 20 ? title.slice(0,17)+'…' : title;
  tab.title = title;
  tab.onclick = () => {
    win.classList.add('visible');
    win.style.zIndex = zIndex++;
    focusWindow(win);
    tab.remove();
  };
  document.getElementById('minimized-tabs').appendChild(tab);
  win.classList.remove('visible','focused');
  if (focused === win) focused = null;
}

function maximizeWindow(win) {
  const d = document.getElementById('desktop');
  win.style.transition = 'all 0.3s ease';
  win.style.left = win.style.top = '0';
  win.style.width = d.clientWidth + 'px';
  win.style.height = d.clientHeight + 'px';
  setTimeout(() => win.style.transition = '', 320);
}

function makeDraggable(win) {
  const tb = win.querySelector('.titlebar');
  tb.onpointerdown = e => {
    if (e.button !== 0) return;
    dragTarget = win;
    focusWindow(win);
    const r = win.getBoundingClientRect();
    dragX = e.clientX - r.left;
    dragY = e.clientY - r.top;
    dragging = true;
    e.preventDefault();
  };
}

function makeFocusable(win) {
  win.onpointerdown = e => {
    if (e.button !== 0) return;
    focusWindow(win);
  };
}

function focusWindow(win) {
  if (focused) focused.classList.remove('focused');
  win.classList.add('focused');
  win.style.zIndex = zIndex++;
  focused = win;
}

function closeWindow(win) {
  win.remove();
  if (focused === win) focused = null;
  if (document.querySelectorAll('.window').length === 0) {
    windowCounter = 0;
  }
}

function closeFocusedWindow() {
  if (focused) {
    closeWindow(focused);
  }
}

document.addEventListener('keydown', e => {
  if (e.altKey && e.key.toLowerCase() === 'x') {
    e.preventDefault();
    closeFocusedWindow();
  }
});

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString([], { hour12: false }) + ' • ' +
    n.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
updateClock();
setInterval(updateClock, 1000);
document.querySelector('.wallpaper-preview').classList.add('selected');

document.onpointermove = e => {
  if (!dragging || !dragTarget) return;
  dragTarget.style.left = (e.clientX - dragX) + 'px';
  dragTarget.style.top = (e.clientY - dragY) + 'px';
};

document.onpointerup = () => {
  dragging = false;
  dragTarget = null;
};
</script>
</body>
</html>
