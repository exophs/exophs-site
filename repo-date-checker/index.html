<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Date Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .repo-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto py-12 px-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold tracking-tight mb-3">Repo Date Checker</h1>
            <p class="text-zinc-400 text-lg">Enter a GitHub repository to see when it was created and last updated.</p>
        </div>

        <!-- Input -->
        <div class="bg-zinc-900 rounded-2xl p-8 border border-zinc-800 mb-8">
            <div class="flex gap-3">
                <input 
                    type="text" 
                    id="repo-input"
                    placeholder="https://github.com/exophs/stellar or exophs/stellar"
                    class="flex-1 bg-zinc-950 border border-zinc-700 focus:border-blue-500 rounded-xl px-5 py-4 text-lg outline-none transition-colors"
                    onkeypress="if(event.key === 'Enter') checkRepo()">
                <button 
                    onclick="checkRepo()"
                    class="bg-white text-black font-semibold px-8 rounded-xl hover:bg-zinc-200 transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 01-14 0 7 7 0 0114 0z" />
                    </svg>
                    Check
                </button>
            </div>
            <p class="text-xs text-zinc-500 mt-3 text-center">Example: exophs/stellar</p>
        </div>

        <!-- Result -->
        <div id="result" class="hidden">
            <div class="repo-card bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
                <div class="flex items-center gap-4 mb-8">
                    <div id="avatar" class="w-14 h-14 rounded-2xl bg-zinc-800 overflow-hidden border border-zinc-700"></div>
                    <div>
                        <div class="flex items-center gap-3">
                            <a id="repo-link" target="_blank" class="text-2xl font-semibold hover:text-blue-400 transition-colors"></a>
                        </div>
                        <p id="description" class="text-zinc-400 mt-1 line-clamp-2"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Created -->
                    <div class="bg-zinc-950 rounded-2xl p-6 border border-zinc-800">
                        <div class="flex items-center gap-3 text-emerald-400 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2" />
                            </svg>
                            <span class="font-medium">Created</span>
                        </div>
                        <div id="created-date" class="text-3xl font-mono font-semibold"></div>
                        <div id="created-relative" class="text-zinc-500 mt-1"></div>
                    </div>

                    <!-- Updated -->
                    <div class="bg-zinc-950 rounded-2xl p-6 border border-zinc-800">
                        <div class="flex items-center gap-3 text-amber-400 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 01-18 0 9 9 0 0118 0z" />
                            </svg>
                            <span class="font-medium">Last Updated</span>
                        </div>
                        <div id="updated-date" class="text-3xl font-mono font-semibold"></div>
                        <div id="updated-relative" class="text-zinc-500 mt-1"></div>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-zinc-800 text-xs text-zinc-500 flex justify-between">
                    <div>Data from GitHub API</div>
                    <button onclick="copyToClipboard()" class="hover:text-white transition-colors flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16v-4m4 4v4m4-8v8m4-4v-4m-16 0h16" />
                        </svg>
                        Copy JSON
                    </button>
                </div>
            </div>
        </div>

        <!-- Error -->
        <div id="error" class="hidden bg-red-950 border border-red-900 text-red-400 rounded-2xl p-6 text-center">
            <p id="error-message" class="font-medium"></p>
        </div>

        <div class="text-center text-zinc-600 text-sm mt-12">
            Built as a quick tool • No data is stored
        </div>
    </div>

    <script>
        async function checkRepo() {
            const input = document.getElementById('repo-input').value.trim();
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            resultDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');

            if (!input) {
                showError("Please enter a repository URL or owner/repo");
                return;
            }

            let owner, repo;
            
            // Parse input
            if (input.includes('github.com')) {
                const match = input.match(/github\.com\/([^\/]+)\/([^\/]+)/);
                if (match) {
                    owner = match[1];
                    repo = match[2];
                }
            } else {
                const parts = input.split('/');
                if (parts.length >= 2) {
                    owner = parts[0];
                    repo = parts[1];
                }
            }

            if (!owner || !repo) {
                showError("Invalid GitHub repository format");
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error("Repository not found");
                    }
                    throw new Error(`GitHub API error: ${response.status}`);
                }

                const data = await response.json();

                // Populate UI
                document.getElementById('avatar').innerHTML = `
                    <img src="${data.owner.avatar_url}" class="w-full h-full object-cover">
                `;
                
                const repoLink = document.getElementById('repo-link');
                repoLink.textContent = `${data.owner.login}/${data.name}`;
                repoLink.href = data.html_url;

                document.getElementById('description').textContent = data.description || "No description provided.";

                // Dates
                const created = new Date(data.created_at);
                const updated = new Date(data.updated_at);

                document.getElementById('created-date').textContent = created.toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
                document.getElementById('created-relative').textContent = `(${timeAgo(created)})`;

                document.getElementById('updated-date').textContent = updated.toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
                document.getElementById('updated-relative').textContent = `(${timeAgo(updated)})`;

                // Store full data for copy
                window.lastRepoData = data;

                resultDiv.classList.remove('hidden');

            } catch (err) {
                showError(err.message);
            }
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            
            return Math.floor(seconds) + " seconds ago";
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            document.getElementById('error-message').textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function copyToClipboard() {
            if (!window.lastRepoData) return;
            
            const jsonStr = JSON.stringify(window.lastRepoData, null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => {
                const btn = document.querySelector('button[onclick="copyToClipboard()"]');
                const original = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => btn.innerHTML = original, 2000);
            });
        }

        // Auto-check example on load
        window.onload = () => {
            document.getElementById('repo-input').value = "exophs/stellar";
            // Optional: checkRepo(); // Uncomment to auto-load
        };
    </script>
</body>
</html>
