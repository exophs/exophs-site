<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Log Chat Extractor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
body{
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
margin:0;
}
h1{
font-weight:500;
letter-spacing:-1px;
margin-bottom:30px;
}
.upload{
border:1px solid #fff;
padding:40px;
width:100%;
max-width:600px;
text-align:center;
cursor:pointer;
transition:.2s;
}
.upload:hover{
background:#111;
}
input{
display:none;
}
.output{
margin-top:40px;
width:100%;
max-width:800px;
background:#111;
padding:30px;
border:1px solid #fff;
white-space:pre-wrap;
font-size:14px;
line-height:1.6;
overflow:auto;
max-height:500px;
}
.actions{
margin-top:20px;
display:flex;
gap:15px;
}
button{
background:#fff;
color:#000;
border:none;
padding:10px 20px;
cursor:pointer;
font-weight:500;
transition:.2s;
}
button:hover{
background:#ccc;
}
.empty{
opacity:.5;
}
</style>
</head>
<body>

<h1>Chat Log Extractor</h1>

<label class="upload">
Upload Minecraft log (.log or .log.gz)
<input type="file" id="fileInput" accept=".log,.gz">
</label>

<div class="actions" style="display:none;" id="actions">
<button id="copyBtn">Copy</button>
<button id="downloadBtn">Download</button>
</div>

<div class="output empty" id="output">
Upload a file to extract chat messages.
</div>

<script>
const fileInput = document.getElementById('fileInput');
const output = document.getElementById('output');
const actions = document.getElementById('actions');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');

fileInput.addEventListener('change', async e => {
const file = e.target.files[0];
if(!file) return;

let text;

if(file.name.endsWith('.gz')){
const buffer = await file.arrayBuffer();
const decompressed = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
text = decompressed;
}else{
text = await file.text();
}

const lines = text.split('\n');
const chat = [];

const regex = /\[(\d{2}:\d{2}:\d{2})\].*\[CHAT\] <([^>]+)> (.*)/;

for(const line of lines){
if(line.includes("[System]")) continue;
if(line.includes("[Meteor]")) continue;

const match = line.match(regex);
if(match){
chat.push(`${match[1]} — ${match[2]}: ${match[3]}`);
}
}

if(chat.length === 0){
output.textContent = "No chat messages found.";
output.classList.remove('empty');
actions.style.display = "none";
return;
}

output.textContent = chat.join('\n');
output.classList.remove('empty');
actions.style.display = "flex";
});

copyBtn.addEventListener('click', () => {
navigator.clipboard.writeText(output.textContent);
copyBtn.textContent = "Copied";
setTimeout(()=>copyBtn.textContent="Copy",1000);
});

downloadBtn.addEventListener('click', () => {
const blob = new Blob([output.textContent], { type: 'text/plain' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = "chat.txt";
a.click();
URL.revokeObjectURL(url);
});
</script>
</body>
</html>
