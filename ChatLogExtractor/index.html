<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Log Extractor v1.0.8</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f14;
    font-family: system-ui, sans-serif;
    color: white;
}

.container {
    width: 95vw;
    height: 90vh;
    display: flex;
    gap: 30px;
}

.panel {
    flex: 1;
    background: #1a1a22;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

h2 {
    margin-top: 0;
    margin-bottom: 15px;
    font-weight: 500;
}

input[type="file"] {
    margin-bottom: 15px;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #5865f2;
    color: white;
    cursor: pointer;
    margin-bottom: 10px;
}

button:hover {
    opacity: 0.9;
}

.output {
    flex: 1;
    background: #111117;
    border-radius: 8px;
    padding: 15px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-family: monospace;
    font-size: 14px;
}

.footer {
    position: absolute;
    bottom: 10px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>
<body>

<div class="container">

    <div class="panel">
        <h2>Upload Minecraft Log</h2>
        <input type="file" id="fileInput" accept=".log,.txt">
        <button onclick="extractLogs()">Extract Chat Logs</button>
        <button onclick="copyOutput()">Copy Output</button>
    </div>

    <div class="panel">
        <h2>Extracted Chat</h2>
        <div class="output" id="output"></div>
    </div>

</div>

<div class="footer">
    Chat Log Extractor v1.0.8
</div>

<script>
const output = document.getElementById("output");

function extractLogs() {
    const fileInput = document.getElementById("fileInput");
    if (!fileInput.files.length) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.split("\n");
        let extracted = [];

        const chatRegex = /^\[(\d{2}:\d{2}:\d{2})\] \[.*?\]: \[Not Secure\] \[CHAT\] <([^>]+)> (.+)$/;

        for (let line of lines) {
            if (line.includes("[Meteor]")) continue;

            const match = line.match(chatRegex);
            if (match) {
                const time = match[1];
                const player = match[2];
                const message = match[3];
                extracted.push(`[${time}] <${player}> ${message}`);
            }
        }

        if (extracted.length === 0) {
            output.textContent = "No chat messages found.";
        } else {
            output.textContent = extracted.join("\n");
        }
    };

    reader.readAsText(fileInput.files[0]);
}

function copyOutput() {
    const text = output.textContent;
    if (!text) return;

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).catch(() => {
            fallbackCopy(text);
        });
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text) {
    const textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
}
</script>

</body>
</html>
