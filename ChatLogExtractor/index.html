<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Log Chat Extractor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

<!-- Minecraftia Font -->
<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
:root {
  --base: #1e1e2e;
  --mantle: #181825;
  --surface0: #313244;
  --surface1: #45475a;
  --text: #e0e0e0;
  --subtext: #a6adc8;
  --mauve: #cba6f7;
  --peach: #fab387;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 30px 40px;
  background: var(--base);
  color: var(--text);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header { margin-bottom: 25px; }

h1 {
  margin: 0;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--peach);
}

.header-line {
  width: 100%;
  height: 2px;
  background: var(--subtext);
  opacity: .4;
  margin-top: 15px;
}

main {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
}

.upload {
  background: var(--mantle);
  border: 1px solid var(--surface1);
  color: var(--subtext);
  padding: 35px;
  width: 100%;
  max-width: 600px;
  text-align: center;
  cursor: pointer;
  transition: .2s;
}

.upload:hover {
  background: var(--surface0);
  border-color: var(--mauve);
  color: var(--text);
}

input { display: none; }

.actions {
  margin-top: 15px;
  display: flex;
  gap: 15px;
}

button {
  background: var(--surface0);
  color: var(--text);
  border: 1px solid var(--surface1);
  padding: 8px 18px;
  font-weight: 500;
  cursor: pointer;
  transition: .2s;
  border-radius: 4px;
}

button:hover {
  background: var(--mauve);
  color: var(--base);
  border-color: var(--mauve);
}

.output {
  margin-top: 25px;
  width: 100%;
  max-width: 900px;
  background: var(--mantle);
  border: 1px solid var(--surface1);
  padding: 20px;
  overflow: auto;
  max-height: 45vh;
  font-family: 'Minecraftia', monospace;
}

/* Minecraft Chat Message */
.chat-line {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 14px;
}

.head {
  width: 32px;
  height: 32px;
  image-rendering: pixelated;
  flex-shrink: 0;
}

.message { line-height: 1.4; }

.timestamp {
  color: #7a7a7a;
  margin-right: 6px;
}

.username {
  font-weight: bold;
  margin-right: 6px;
  color: #55FF55;
}

.text { color: #ffffff; }

/* Scrollbar */
.output {
  scrollbar-width: thin;
  scrollbar-color: var(--mauve) var(--surface0);
}

.output::-webkit-scrollbar { width: 10px; }

.output::-webkit-scrollbar-track { background: var(--surface0); }

.output::-webkit-scrollbar-thumb {
  background: var(--mauve);
  border-radius: 6px;
  border: 2px solid var(--surface0);
}

.output::-webkit-scrollbar-thumb:hover { background: var(--peach); }

.empty {
  opacity: .5;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.footer-fade {
  height: 28px;
  background: linear-gradient(to bottom, rgba(30,30,46,0) 0%, var(--base) 100%);
}

/* Footer - compact version */
footer {
  padding: 12px 0;
  border-top: 1px solid var(--surface1);
  font-size: 13px;
  color: var(--subtext);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 44px;
}

footer .left,
footer .center,
footer .right {
  flex: 1;
}

footer .left { min-width: 140px; }

footer .right {
  text-align: right;
  min-width: 100px;
}

footer .center { text-align: center; }

footer .brand {
  color: var(--peach);
  font-weight: 500;
}

footer .links {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}

footer .link-btn {
  background: var(--surface0);
  color: var(--mauve);
  border: 1px solid var(--surface1);
  padding: 6px 14px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 500;
  transition: all .2s;
  font-size: 13px;
}

footer .link-btn:hover {
  background: var(--mauve);
  color: var(--base);
  border-color: var(--mauve);
  transform: translateY(-1px);
}

footer .version {
  font-size: 11px;
  opacity: 0.7;
}

/* Mobile adjustments */
@media (max-width: 600px) {
  footer {
    flex-direction: column;
    gap: 8px;
    padding: 10px 0;
    text-align: center;
  }
  
  footer .left,
  footer .right {
    text-align: center;
  }
  
  footer .links {
    gap: 12px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Chat Log Extractor</h1>
  <div class="header-line"></div>
</header>

<main>
  <label class="upload">
    Upload Minecraft log (.log or .log.gz)
    <input type="file" id="fileInput" accept=".log,.gz">
  </label>

  <div class="actions" id="actions" style="display:none;">
    <button id="copyBtn">Copy</button>
    <button id="downloadBtn">Download</button>
  </div>

  <div class="output empty" id="output">
    Upload a file to extract chat messages.
  </div>
</main>

<div class="footer-fade"></div>

<footer>
  <div class="left">
    © 2026 <span class="brand">ray (exophs)</span>
  </div>

  <div class="center">
    <div class="links">
      <a href="https://github.com/exophs" target="_blank" class="link-btn">GitHub</a>
      <a href="https://exophs.space" target="_blank" class="link-btn">exophs.space</a>
    </div>
  </div>

  <div class="right">
    <div class="version">v1.1.5</div>
  </div>
</footer>

<script>
const fileInput = document.getElementById('fileInput');
const output = document.getElementById('output');
const actions = document.getElementById('actions');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');

function getHeadURL(username) {
  return `https://mc-heads.net/avatar/${username}/32`;
}

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  let text;

  if (file.name.endsWith('.gz')) {
    const buffer = await file.arrayBuffer();
    text = pako.ungzip(new Uint8Array(buffer), { to: 'string' });
  } else {
    text = await file.text();
  }

  const lines = text.split('\n');
  const regex = /\[(\d{2}:\d{2}:\d{2})\].*\[CHAT\] <([^>]+)> (.*)/;

  output.innerHTML = "";
  let found = false;

  for (const line of lines) {
    if (line.includes("[System]") || line.includes("[Meteor]")) continue;

    const match = line.match(regex);
    if (match) {
      found = true;
      const time = match[1];
      const user = match[2];
      const message = match[3];

      const chatLine = document.createElement("div");
      chatLine.className = "chat-line";

      const head = document.createElement("img");
      head.className = "head";
      head.src = getHeadURL(user);

      const messageDiv = document.createElement("div");
      messageDiv.className = "message";
      messageDiv.innerHTML = 
        `<span class="timestamp">[${time}]</span>
         <span class="username">${user}</span>
         <span class="text">${message}</span>`;

      chatLine.appendChild(head);
      chatLine.appendChild(messageDiv);
      output.appendChild(chatLine);
    }
  }

  if (!found) {
    output.textContent = "No chat messages found.";
    output.classList.remove('empty');
    actions.style.display = "none";
    return;
  }

  output.classList.remove('empty');
  actions.style.display = "flex";
});

function fallbackCopy(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.opacity = "0";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
}

copyBtn.addEventListener('click', () => {
  const text = output.innerText;
  if (!text) return;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }

  copyBtn.textContent = "Copied";
  setTimeout(() => { copyBtn.textContent = "Copy"; }, 1000);
});

downloadBtn.addEventListener('click', () => {
  const blob = new Blob([output.innerText], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "chat.txt";
  a.click();
  URL.revokeObjectURL(url);
});
</script>

</body>
</html>
