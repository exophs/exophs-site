<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Log Chat Extractor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

<style>
:root {
--base:#1e1e2e;
--mantle:#181825;
--surface0:#313244;
--surface1:#45475a;
--text:#cdd6f4;
--subtext:#a6adc8;
--mauve:#cba6f7;
--peach:#fab387;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:30px 40px;
background:var(--base);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

header{margin-bottom:25px;}

h1{
margin:0;
font-weight:500;
letter-spacing:2px;
color:var(--peach);
}

.header-line{
width:100%;
height:2px;
background:var(--subtext);
opacity:.4;
margin-top:15px;
}

main{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
flex:1;
}

.upload{
background:var(--mantle);
border:1px solid var(--surface1);
color:var(--subtext);
padding:35px;
width:100%;
max-width:600px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.upload:hover{
background:var(--surface0);
border-color:var(--mauve);
color:var(--text);
}

input{display:none;}

.actions{
margin-top:15px;
display:flex;
gap:15px;
}

button{
background:var(--surface0);
color:var(--text);
border:1px solid var(--surface1);
padding:8px 18px;
font-weight:500;
cursor:pointer;
transition:.2s;
}

button:hover{
background:var(--mauve);
color:var(--base);
border-color:var(--mauve);
}

.output{
margin-top:25px;
width:100%;
max-width:850px;
background:var(--mantle);
border:1px solid var(--surface1);
padding:20px;
white-space:pre-wrap;
font-size:14px;
line-height:1.5;
overflow:auto;
max-height:40vh;

/* Firefox scrollbar */
scrollbar-width:thin;
scrollbar-color:var(--mauve) var(--surface0);
}

/* WebKit scrollbar */
.output::-webkit-scrollbar{
width:10px;
}

.output::-webkit-scrollbar-track{
background:var(--surface0);
}

.output::-webkit-scrollbar-thumb{
background:var(--surface1);
border-radius:6px;
border:2px solid var(--surface0);
}

.output::-webkit-scrollbar-thumb:hover{
background:var(--mauve);
}

.empty{opacity:.5;}

.footer-fade{
height:50px;
background:linear-gradient(to bottom,rgba(30,30,46,0) 0%,var(--base) 100%);
}

footer{
padding:15px 0;
border-top:1px solid var(--surface1);
font-size:14px;
color:var(--subtext);
display:flex;
justify-content:space-between;
align-items:center;
}

footer .brand{
color:var(--peach);
font-weight:500;
}

footer .center{
display:flex;
gap:20px;
}

footer a{
color:var(--mauve);
text-decoration:none;
transition:.2s;
}

footer a:hover{color:var(--peach);}

footer .version{
font-size:12px;
opacity:.6;
}
</style>
</head>

<body>

<header>
<h1>Chat Log Extractor</h1>
<div class="header-line"></div>
</header>

<main>
<label class="upload">
Upload Minecraft log (.log or .log.gz)
<input type="file" id="fileInput" accept=".log,.gz">
</label>

<div class="actions" id="actions" style="display:none;">
<button id="copyBtn">Copy</button>
<button id="downloadBtn">Download</button>
</div>

<div class="output empty" id="output">
Upload a file to extract chat messages.
</div>
</main>

<div class="footer-fade"></div>

<footer>
<div>
© 2026 <span class="brand">ray (exophs)</span>
</div>

<div class="center">
<a href="https://github.com/exophs" target="_blank">GitHub</a>
<a href="https://exophs.space" target="_blank">exophs.space</a>
</div>

<div class="version">
v1.0.9
</div>
</footer>

<script>
const fileInput=document.getElementById('fileInput');
const output=document.getElementById('output');
const actions=document.getElementById('actions');
const copyBtn=document.getElementById('copyBtn');
const downloadBtn=document.getElementById('downloadBtn');

fileInput.addEventListener('change',async(e)=>{
const file=e.target.files[0];
if(!file)return;

let text;

if(file.name.endsWith('.gz')){
const buffer=await file.arrayBuffer();
text=pako.ungzip(new Uint8Array(buffer),{to:'string'});
}else{
text=await file.text();
}

const lines=text.split('\n');
const chat=[];
const regex=/\[(\d{2}:\d{2}:\d{2})\].*\[CHAT\] <([^>]+)> (.*)/;

for(const line of lines){
if(line.includes("[System]"))continue;
if(line.includes("[Meteor]"))continue;

const match=line.match(regex);
if(match){
chat.push(`${match[1]} — ${match[2]}: ${match[3]}`);
}
}

if(chat.length===0){
output.textContent="No chat messages found.";
output.classList.remove('empty');
actions.style.display="none";
return;
}

output.textContent=chat.join('\n');
output.classList.remove('empty');
actions.style.display="flex";
});

function fallbackCopy(text){
const textarea=document.createElement("textarea");
textarea.value=text;
textarea.style.position="fixed";
textarea.style.opacity="0";
document.body.appendChild(textarea);
textarea.focus();
textarea.select();
document.execCommand("copy");
document.body.removeChild(textarea);
}

copyBtn.addEventListener('click',()=>{
const text=output.textContent;
if(!text)return;

if(navigator.clipboard&&window.isSecureContext){
navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
}else{
fallbackCopy(text);
}

copyBtn.textContent="Copied";
setTimeout(()=>{copyBtn.textContent="Copy";},1000);
});

downloadBtn.addEventListener('click',()=>{
const blob=new Blob([output.textContent],{type:'text/plain'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download="chat.txt";
a.click();
URL.revokeObjectURL(url);
});
</script>

</body>
</html>
