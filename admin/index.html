<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
        }
        .container {
            width: min(100%, 640px);
        }
        h1 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 24px;
            font-family: monospace;
        }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #e2e2e2;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 16px;
            font-family: monospace;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: #0f3460;
            border: 1px solid #1a4a80;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        input::placeholder { color: #888; }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-family: monospace;
        }
        .btn-primary { background: #4CAF50; color: #fff; }
        .btn-primary:hover { background: #45a049; }
        .btn-danger { background: #e55; color: #fff; }
        .btn-danger:hover { background: #c33; }
        .btn-secondary { background: #0f3460; color: #ccc; }
        .btn-secondary:hover { background: #1a4a80; }
        .error { color: #ff6b6b; font-size: 13px; margin-top: 6px; }
        #login-section { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        #login-card { width: min(100%, 380px); }
        #admin-section { display: none; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: #0f3460;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50;
            font-family: monospace;
        }
        .stat-box .label {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
        .announcement-list { margin-top: 14px; }
        .announcement-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f3460;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #ddd;
        }
        .announcement-item .msg { flex: 1; margin-right: 10px; word-break: break-word; }
        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-right: 8px;
        }
        .badge-active { background: #1a4a1a; color: #4CAF50; }
        .badge-inactive { background: #3a1a1a; color: #e55; }
        .views-list { margin-top: 12px; }
        .views-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 13px;
            color: #ccc;
            font-family: monospace;
        }
        .views-row .path { color: #7eb8f7; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

<div id="login-section">
    <div class="card" id="login-card">
        <h2 style="text-align:center;color:#e2e2e2;font-family:monospace;letter-spacing:1px;">ADMIN LOGIN</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <div style="display:flex;gap:8px;">
            <button class="btn-primary" id="login-button" style="flex:1;">Login</button>
            <button class="btn-secondary" id="toggle-password">Show</button>
        </div>
        <p class="error" id="error-message"></p>
    </div>
</div>

<div class="container" id="admin-section">
    <div class="top-bar">
        <h1>// admin dashboard</h1>
        <button class="btn-danger" id="logout-button">Logout</button>
    </div>

    <div class="card">
        <h2>Site Analytics</h2>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="num" id="stat-total">—</div>
                <div class="label">Total Views</div>
            </div>
            <div class="stat-box">
                <div class="num" id="stat-today">—</div>
                <div class="label">Today</div>
            </div>
            <div class="stat-box">
                <div class="num" id="stat-week">—</div>
                <div class="label">This Week</div>
            </div>
        </div>
        <h2 style="margin-top:16px;">Top Pages</h2>
        <div class="views-list" id="top-pages"></div>
    </div>

    <div class="card">
        <h2>Announcement Banner</h2>
        <input type="text" id="announcement-input" placeholder="Write an announcement...">
        <button class="btn-primary" id="post-announcement">Post Announcement</button>
        <div class="announcement-list" id="announcement-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://vhyboshqppbgzarylmuv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoeWJvc2hxcHBiZ3phcnlsbXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTUzMzksImV4cCI6MjA5NDczMTMzOX0.ROc6E_HsMZOuRQB1C9Fj37QWA8PddcZwXxcrgv_kP0Q';
    const ADMIN_EMAIL = 'bezeski@gmail.com';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginSection = document.getElementById('login-section');
    const adminSection = document.getElementById('admin-section');
    const errorMessage = document.getElementById('error-message');

    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session && session.user.email === ADMIN_EMAIL) {
            showAdmin();
        }
    }

    function showAdmin() {
        loginSection.style.display = 'none';
        adminSection.style.display = 'block';
        loadAnalytics();
        loadAnnouncements();
    }

    function showLogin() {
        loginSection.style.display = 'flex';
        adminSection.style.display = 'none';
        errorMessage.textContent = '';
    }

    document.getElementById('login-button').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorMessage.textContent = '';
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error || !data.user) { errorMessage.textContent = 'Invalid credentials.'; return; }
        if (data.user.email !== ADMIN_EMAIL) { await sb.auth.signOut(); errorMessage.textContent = 'Access denied.'; return; }
        showAdmin();
    });

    document.getElementById('logout-button').addEventListener('click', async () => {
        await sb.auth.signOut();
        showLogin();
    });

    document.getElementById('toggle-password').addEventListener('click', () => {
        const pw = document.getElementById('password');
        const btn = document.getElementById('toggle-password');
        pw.type = pw.type === 'password' ? 'text' : 'password';
        btn.textContent = pw.type === 'password' ? 'Show' : 'Hide';
    });

    async function loadAnalytics() {
        const { data: all } = await sb.from('page_views').select('path, visited_at');
        if (!all) return;

        const now = new Date();
        const todayStr = now.toISOString().slice(0, 10);
        const weekAgo = new Date(now - 7 * 86400000).toISOString();

        document.getElementById('stat-total').textContent = all.length;
        document.getElementById('stat-today').textContent = all.filter(r => r.visited_at.startsWith(todayStr)).length;
        document.getElementById('stat-week').textContent = all.filter(r => r.visited_at >= weekAgo).length;

        const counts = {};
        all.forEach(r => { counts[r.path] = (counts[r.path] || 0) + 1; });
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);

        const container = document.getElementById('top-pages');
        container.innerHTML = sorted.map(([path, count]) =>
            `<div class="views-row"><span class="path">${path}</span><span>${count} views</span></div>`
        ).join('');
    }

    async function loadAnnouncements() {
        const { data } = await sb.from('announcements').select('*').order('created_at', { ascending: false }).limit(10);
        const container = document.getElementById('announcement-list');
        if (!data || data.length === 0) { container.innerHTML = '<p style="color:#666;font-size:13px;">No announcements yet.</p>'; return; }
        container.innerHTML = data.map(a => `
            <div class="announcement-item">
                <span class="badge ${a.active ? 'badge-active' : 'badge-inactive'}">${a.active ? 'live' : 'off'}</span>
                <span class="msg">${a.message}</span>
                <div style="display:flex;gap:6px;flex-shrink:0;">
                    <button class="btn-secondary" onclick="toggleAnnouncement('${a.id}', ${a.active})" style="padding:5px 10px;font-size:12px;">${a.active ? 'Deactivate' : 'Activate'}</button>
                    <button class="btn-danger" onclick="deleteAnnouncement('${a.id}')" style="padding:5px 10px;font-size:12px;">Delete</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('post-announcement').addEventListener('click', async () => {
        const msg = document.getElementById('announcement-input').value.trim();
        if (!msg) return;
        await sb.from('announcements').insert({ message: msg, active: true });
        document.getElementById('announcement-input').value = '';
        loadAnnouncements();
    });

    async function toggleAnnouncement(id, current) {
        await sb.from('announcements').update({ active: !current }).eq('id', id);
        loadAnnouncements();
    }

    async function deleteAnnouncement(id) {
        await sb.from('announcements').delete().eq('id', id);
        loadAnnouncements();
    }

    checkSession();
</script>
</body>
</html>
