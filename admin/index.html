<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #E5E5E5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: min(90%, 420px);
            padding: 24px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 20px; font-size: 22px; color: #333; text-align: center; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }
        button:hover { background-color: #45a049; }
        #logout-button { background-color: #e55; }
        #logout-button:hover { background-color: #c33; }
        #toggle-password { background-color: #888; }
        #toggle-password:hover { background-color: #666; }
        .error { color: red; font-size: 14px; margin-top: 4px; text-align: center; }
        .hidden { display: none; }
        #admin-content { display: none; }
        .datetime-display {
            background: #f5f5f5;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="login-section">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button type="button" id="toggle-password">Show Password</button>
        <button type="button" id="login-button">Login</button>
        <p class="error" id="error-message"></p>
    </div>

    <div id="admin-content">
        <h2>Admin Dashboard</h2>
        <button id="logout-button">Logout</button>
        <button id="change-bg-color">Change Background Color</button>
        <button id="toggle-dark-mode">Toggle Dark Mode</button>
        <button id="reset-bg-color">Reset Background Color</button>
        <button id="show-date-time">Show Date & Time</button>
        <div class="datetime-display" id="datetime-display"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://vhyboshqppbgzarylmuv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoeWJvc2hxcHBiZ3phcnlsbXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTUzMzksImV4cCI6MjA5NDczMTMzOX0.ROc6E_HsMZOuRQB1C9Fj37QWA8PddcZwXxcrgv_kP0Q';
    const ADMIN_EMAIL = 'bezeski@gmail.com';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginSection = document.getElementById('login-section');
    const adminContent = document.getElementById('admin-content');
    const errorMessage = document.getElementById('error-message');

    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session && session.user.email === ADMIN_EMAIL) {
            showAdmin();
        }
    }

    function showAdmin() {
        loginSection.style.display = 'none';
        adminContent.style.display = 'block';
    }

    function showLogin() {
        loginSection.style.display = 'block';
        adminContent.style.display = 'none';
        errorMessage.textContent = '';
    }

    document.getElementById('login-button').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorMessage.textContent = '';

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error || !data.user) {
            errorMessage.textContent = 'Invalid credentials.';
            return;
        }
        if (data.user.email !== ADMIN_EMAIL) {
            await sb.auth.signOut();
            errorMessage.textContent = 'Access denied.';
            return;
        }
        showAdmin();
    });

    document.getElementById('logout-button').addEventListener('click', async () => {
        await sb.auth.signOut();
        showLogin();
    });

    document.getElementById('toggle-password').addEventListener('click', () => {
        const pw = document.getElementById('password');
        const btn = document.getElementById('toggle-password');
        if (pw.type === 'password') {
            pw.type = 'text';
            btn.textContent = 'Hide Password';
        } else {
            pw.type = 'password';
            btn.textContent = 'Show Password';
        }
    });

    let isDark = false;
    document.getElementById('toggle-dark-mode').addEventListener('click', () => {
        isDark = !isDark;
        document.body.style.backgroundColor = isDark ? '#222' : '#E5E5E5';
        document.querySelector('.container').style.backgroundColor = isDark ? '#444' : '#fff';
        document.querySelector('.container').style.color = isDark ? '#fff' : '#333';
    });

    document.getElementById('change-bg-color').addEventListener('click', () => {
        const color = prompt('Enter a HEX color (e.g. #FF5733):');
        if (!color) return;
        if (/^#[0-9A-Fa-f]{6}$/.test(color)) {
            document.querySelector('.container').style.backgroundColor = color;
        } else {
            alert('Invalid HEX color.');
        }
    });

    document.getElementById('reset-bg-color').addEventListener('click', () => {
        document.querySelector('.container').style.backgroundColor = isDark ? '#444' : '#fff';
        document.body.style.backgroundColor = isDark ? '#222' : '#E5E5E5';
    });

    document.getElementById('show-date-time').addEventListener('click', () => {
        const display = document.getElementById('datetime-display');
        display.style.display = display.style.display === 'none' ? 'block' : 'none';
        display.textContent = new Date().toLocaleString();
    });

    checkSession();
</script>
</body>
</html>
