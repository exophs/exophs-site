<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin // exophs</title>
    <style>
        :root {
            --crust:     #11111b;
            --mantle:    #181825;
            --base:      #1e1e2e;
            --surface0:  #313244;
            --surface1:  #45475a;
            --surface2:  #585b70;
            --overlay0:  #6c7086;
            --overlay1:  #7f849c;
            --overlay2:  #9399b2;
            --subtext0:  #a6adc8;
            --subtext1:  #bac2de;
            --text:      #cdd6f4;
            --lavender:  #b4befe;
            --blue:      #89b4fa;
            --sapphire:  #74c7ec;
            --sky:       #89dceb;
            --teal:      #94e2d5;
            --green:     #a6e3a1;
            --yellow:    #f9e2af;
            --peach:     #fab387;
            --maroon:    #eba0ac;
            --red:       #f38ba8;
            --mauve:     #cba6f7;
            --pink:      #f5c2e7;
            --flamingo:  #f2cdcd;
            --rosewater: #f5e0dc;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", "DejaVu Sans Mono", "Roboto Mono", Consolas, Monaco, "Courier New", monospace;
            background: var(--base);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            animation: scanlines 8s linear infinite;
        }
        @keyframes scanlines {
            from { background-position: 0 0; }
            to { background-position: 0 100px; }
        }

        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 2;
        }
        .corner-tl { top: 20px; left: 20px; border-top: 1px solid rgba(203,166,247,0.2); border-left: 1px solid rgba(203,166,247,0.2); }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(203,166,247,0.2); border-right: 1px solid rgba(203,166,247,0.2); }

        #login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            animation: fadeIn 0.6s ease forwards;
        }

        .login-box {
            width: min(100%, 360px);
            text-align: center;
        }

        .login-fields {
            opacity: 0;
            animation: fadeUp 0.6s 0.4s forwards;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 10px;
        }

        .input-wrap input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(49,50,68,0.6);
            border: 1px solid rgba(180,190,254,0.1);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.05em;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrap input:focus {
            border-color: rgba(203,166,247,0.4);
        }

        .input-wrap input::placeholder { color: var(--overlay0); }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        button {
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 11px 18px;
            transition: all 0.2s;
        }

        .btn-main {
            flex: 1;
            background: rgba(203,166,247,0.15);
            color: var(--mauve);
            border: 1px solid rgba(203,166,247,0.3);
        }
        .btn-main:hover {
            background: rgba(203,166,247,0.25);
            border-color: rgba(203,166,247,0.5);
        }

        .btn-ghost {
            background: rgba(49,50,68,0.6);
            color: var(--overlay1);
            border: 1px solid rgba(180,190,254,0.1);
        }
        .btn-ghost:hover {
            color: var(--text);
            border-color: rgba(180,190,254,0.25);
        }

        .btn-red {
            background: rgba(243,139,168,0.12);
            color: var(--red);
            border: 1px solid rgba(243,139,168,0.25);
        }
        .btn-red:hover {
            background: rgba(243,139,168,0.22);
        }

        .btn-green {
            background: rgba(166,227,161,0.12);
            color: var(--green);
            border: 1px solid rgba(166,227,161,0.25);
        }
        .btn-green:hover {
            background: rgba(166,227,161,0.22);
        }

        .error-msg {
            font-size: 12px;
            color: var(--red);
            letter-spacing: 0.05em;
            margin-top: 10px;
            min-height: 18px;
        }

        #admin-section {
            display: none;
            max-width: 700px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            animation: fadeIn 0.5s ease forwards;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 36px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(180,190,254,0.08);
        }

        .admin-title {
            font-size: 13px;
            color: var(--overlay1);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .admin-title span { color: var(--mauve); }

        .card {
            background: rgba(24,24,37,0.6);
            border: 1px solid rgba(180,190,254,0.08);
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(8px);
        }

        .card-label {
            font-size: 10px;
            letter-spacing: 0.3em;
            color: var(--mauve);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(203,166,247,0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(49,50,68,0.4);
            border: 1px solid rgba(180,190,254,0.06);
            border-radius: 4px;
            padding: 16px 12px;
            text-align: center;
        }

        .stat-num {
            font-size: 30px;
            font-weight: bold;
            color: var(--text);
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-num.green { color: var(--green); }
        .stat-num.blue  { color: var(--blue); }
        .stat-num.mauve { color: var(--mauve); }

        .stat-label {
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--overlay0);
            text-transform: uppercase;
        }

        .views-list { margin-top: 4px; }

        .views-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid rgba(180,190,254,0.05);
            font-size: 12px;
        }

        .views-row:last-child { border-bottom: none; }

        .views-path { color: var(--blue); letter-spacing: 0.05em; }

        .views-count {
            font-size: 11px;
            color: var(--overlay1);
            background: rgba(49,50,68,0.6);
            padding: 2px 10px;
            border-radius: 99px;
            border: 1px solid rgba(180,190,254,0.08);
        }

        .views-empty {
            font-size: 12px;
            color: var(--overlay0);
            letter-spacing: 0.1em;
            padding: 8px 0;
        }

        .announce-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .announce-input-row input {
            flex: 1;
            padding: 11px 14px;
            background: rgba(49,50,68,0.6);
            border: 1px solid rgba(180,190,254,0.1);
            border-radius: 4px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .announce-input-row input:focus {
            border-color: rgba(203,166,247,0.4);
        }

        .announce-input-row input::placeholder { color: var(--overlay0); }

        .announcement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(49,50,68,0.3);
            border: 1px solid rgba(180,190,254,0.06);
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .badge {
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 99px;
            flex-shrink: 0;
        }

        .badge-live {
            background: rgba(166,227,161,0.12);
            color: var(--green);
            border: 1px solid rgba(166,227,161,0.25);
        }

        .badge-off {
            background: rgba(243,139,168,0.1);
            color: var(--maroon);
            border: 1px solid rgba(243,139,168,0.2);
        }

        .badge-host {
            background: rgba(203,166,247,0.12);
            color: var(--mauve);
            border: 1px solid rgba(203,166,247,0.25);
        }

        .badge-guest {
            background: rgba(49,50,68,0.6);
            color: var(--overlay1);
            border: 1px solid rgba(180,190,254,0.1);
        }

        .announce-msg {
            flex: 1;
            color: var(--subtext1);
            word-break: break-word;
            letter-spacing: 0.03em;
        }

        .announce-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .announce-actions button {
            padding: 5px 10px;
            font-size: 10px;
            letter-spacing: 0.1em;
        }

        .no-announce {
            font-size: 12px;
            color: var(--overlay0);
            letter-spacing: 0.1em;
            padding: 4px 0;
        }

        .gw-nick {
            color: var(--overlay1);
            margin-right: 6px;
        }

        .gw-time {
            display: block;
            font-size: 10px;
            color: var(--overlay0);
            margin-top: 3px;
            letter-spacing: 0.08em;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .stat-num { font-size: 22px; }
            .announce-input-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>

<div id="login-section">
    <div class="login-box">
        <div class="login-fields">
            <div class="input-wrap">
                <input type="email" id="email" placeholder="email">
            </div>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="password">
            </div>
            <div class="btn-row">
                <button class="btn-main" id="login-button">login</button>
                <button class="btn-ghost" id="toggle-password">show</button>
            </div>
            <p class="error-msg" id="error-message"></p>
        </div>
    </div>
</div>

<div id="admin-section">
    <div class="admin-header">
        <p class="admin-title"><span>//</span> admin dashboard</p>
        <button class="btn-red" id="logout-button">logout</button>
    </div>

    <div class="card">
        <p class="card-label">site analytics</p>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-num mauve" id="stat-total">—</div>
                <div class="stat-label">total</div>
            </div>
            <div class="stat-box">
                <div class="stat-num green" id="stat-today">—</div>
                <div class="stat-label">today</div>
            </div>
            <div class="stat-box">
                <div class="stat-num blue" id="stat-week">—</div>
                <div class="stat-label">this week</div>
            </div>
        </div>
        <p class="card-label">top pages</p>
        <div class="views-list" id="top-pages"></div>
    </div>

    <div class="card">
        <p class="card-label">announcement banner</p>
        <div class="announce-input-row">
            <input type="text" id="announcement-input" placeholder="write an announcement...">
            <button class="btn-green" id="post-announcement">post</button>
        </div>
        <div id="announcement-list"></div>
    </div>

    <div class="card">
        <p class="card-label">guest wall messages</p>
        <div id="gw-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    let sb;
    let ADMIN_EMAIL;

    async function init() {
        const config = await fetch('/api/admin-data').then(r => r.json());
        ADMIN_EMAIL = config.email;
        const { createClient } = supabase;
        sb = createClient(config.url, config.key);
        checkSession();
    }

    init();

    const loginSection = document.getElementById('login-section');
    const adminSection = document.getElementById('admin-section');
    const errorMessage = document.getElementById('error-message');

    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session && session.user.email === ADMIN_EMAIL) showAdmin();
    }

    function showAdmin() {
        loginSection.style.display = 'none';
        adminSection.style.display = 'block';
        loadAnalytics();
        loadAnnouncements();
        loadGuestWall();
    }

    function showLogin() {
        loginSection.style.display = 'flex';
        adminSection.style.display = 'none';
        errorMessage.textContent = '';
    }

    document.getElementById('login-button').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        errorMessage.textContent = '';
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error || !data.user) { errorMessage.textContent = 'invalid credentials.'; return; }
        if (data.user.email !== ADMIN_EMAIL) { await sb.auth.signOut(); errorMessage.textContent = 'access denied.'; return; }
        showAdmin();
    });

    document.getElementById('logout-button').addEventListener('click', async () => {
        await sb.auth.signOut();
        showLogin();
    });

    document.getElementById('toggle-password').addEventListener('click', () => {
        const pw = document.getElementById('password');
        const btn = document.getElementById('toggle-password');
        pw.type = pw.type === 'password' ? 'text' : 'password';
        btn.textContent = pw.type === 'password' ? 'show' : 'hide';
    });

    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('login-button').click();
    });

    async function loadAnalytics() {
        const { data: all } = await sb.from('page_views').select('path, visited_at');
        if (!all) return;

        const now = new Date();
        const todayStr = now.toISOString().slice(0, 10);
        const weekAgo = new Date(now - 7 * 86400000).toISOString();

        document.getElementById('stat-total').textContent = all.length;
        document.getElementById('stat-today').textContent = all.filter(r => r.visited_at.startsWith(todayStr)).length;
        document.getElementById('stat-week').textContent = all.filter(r => r.visited_at >= weekAgo).length;

        const counts = {};
        all.forEach(r => { counts[r.path] = (counts[r.path] || 0) + 1; });
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);

        const container = document.getElementById('top-pages');
        if (sorted.length === 0) {
            container.innerHTML = '<p class="views-empty">no data yet.</p>';
            return;
        }
        container.innerHTML = sorted.map(([path, count]) =>
            `<div class="views-row">
                <span class="views-path">${path}</span>
                <span class="views-count">${count} views</span>
            </div>`
        ).join('');
    }

    async function loadAnnouncements() {
        const { data } = await sb.from('announcements').select('*').order('created_at', { ascending: false }).limit(10);
        const container = document.getElementById('announcement-list');
        if (!data || data.length === 0) {
            container.innerHTML = '<p class="no-announce">no announcements yet.</p>';
            return;
        }
        container.innerHTML = data.map(a => `
            <div class="announcement-item">
                <span class="badge ${a.active ? 'badge-live' : 'badge-off'}">${a.active ? 'live' : 'off'}</span>
                <span class="announce-msg">${a.message}</span>
                <div class="announce-actions">
                    <button class="btn-ghost" onclick="toggleAnnouncement('${a.id}', ${a.active})">${a.active ? 'deactivate' : 'activate'}</button>
                    <button class="btn-red" onclick="deleteAnnouncement('${a.id}')">delete</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('post-announcement').addEventListener('click', async () => {
        const msg = document.getElementById('announcement-input').value.trim();
        if (!msg) return;
        await sb.from('announcements').insert({ message: msg, active: true });
        document.getElementById('announcement-input').value = '';
        loadAnnouncements();
    });

    document.getElementById('announcement-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('post-announcement').click();
    });

    async function toggleAnnouncement(id, current) {
        await sb.from('announcements').update({ active: !current }).eq('id', id);
        loadAnnouncements();
    }

    async function deleteAnnouncement(id) {
        await sb.from('announcements').delete().eq('id', id);
        loadAnnouncements();
    }

    async function loadGuestWall() {
        const { data } = await sb
            .from('guest_wall')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(50);

        const container = document.getElementById('gw-list');
        if (!data || data.length === 0) {
            container.innerHTML = '<p class="no-announce">no messages yet.</p>';
            return;
        }

        container.innerHTML = data.map(m => {
            const nick = m.nickname || 'anonymous';
            const isHost = m.source === 'discord';
            const time = new Date(m.created_at).toLocaleString();
            return `
                <div class="announcement-item">
                    <span class="badge ${isHost ? 'badge-host' : 'badge-guest'}">${isHost ? 'host' : 'guest'}</span>
                    <span class="announce-msg">
                        <span class="gw-nick">${nick}</span>${m.message}<span class="gw-time">${time}</span>
                    </span>
                    <div class="announce-actions">
                        <button class="btn-red" onclick="deleteGuestMsg('${m.id}', this)">delete</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function deleteGuestMsg(id, btn) {
        btn.disabled = true;
        btn.textContent = '...';
        await sb.from('guest_wall').delete().eq('id', id);
        btn.closest('.announcement-item').remove();
        const remaining = document.querySelectorAll('#gw-list .announcement-item').length;
        if (remaining === 0) document.getElementById('gw-list').innerHTML = '<p class="no-announce">no messages yet.</p>';
    }

    checkSession();
</script>
</body>
</html>
